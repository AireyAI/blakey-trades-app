<!DOCTYPE html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0}
  .tile{width:512px;height:512px;display:grid;place-items:center;
    background:radial-gradient(120% 120% at 35% 25%,#1a1407,#0E0E12 55%,#040406);position:relative;overflow:hidden}
  .tile::after{content:"";position:absolute;inset:0;box-shadow:inset 0 0 0 6px rgba(199,164,77,.14)}
  .glow{position:absolute;width:420px;height:420px;border-radius:50%;
    background:radial-gradient(circle,rgba(199,164,77,.35),transparent 65%);filter:blur(6px)}
  img{width:318px;height:318px;position:relative;filter:drop-shadow(0 14px 34px rgba(199,164,77,.45))}
</style></head><body>
  <div class="tile"><div class="glow"></div><img src="coin.svg"></div>
</body></html>
